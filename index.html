<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Planning Logistique Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #cbd5e1; text-align: center; font-size: 0.65rem; padding: 2px; height: 30px; }
        .name-col { width: 180px; text-align: left; padding-left: 8px; font-weight: 800; background: #f8fafc; }
        .hour-col { width: 50px; background: #f1f5f9; color: #64748b; font-size: 0.6rem; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: 800; text-transform: uppercase; background: transparent; outline: none; }
        
        /* Couleurs de ton image */
        .header-date { background-color: #93c5fd; font-weight: 900; }
        .header-sub { background-color: #fef08a; font-weight: 800; }
        .bg-mal, .bg-at { background-color: #f97316 !important; color: white; }
        .bg-cp { background-color: #fef08a !important; color: black; }
        .bg-abs { background-color: #ef4444 !important; color: white; }
        .bg-bureau { background-color: #e2e8f0; }
        .tournee-ok { border: 2px solid #22c55e !important; background: #dcfce7; color: #15803d; }
        
        @media print { 
            .no-print { display: none !important; } 
            body { padding: 0; background: white; }
            table { font-size: 0.5rem; }
            .bg-mal, .bg-at, .bg-cp, .header-date { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-slate-200 p-2 font-sans">

<div class="mx-auto bg-white shadow-2xl rounded-lg overflow-hidden border border-slate-300">
    
    <div class="p-4 bg-slate-800 text-white no-print">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black text-blue-400">PLANNING LOGISTIQUE</h1>
                <select id="week-selector" onchange="switchWeek()" class="bg-slate-700 p-2 rounded font-bold text-xs">
                    <option value="S1">SEMAINE 1</option>
                    <option value="S2">SEMAINE 2</option>
                </select>
                <div class="flex items-center bg-slate-700 p-1 rounded">
                    <span class="text-[10px] px-2 font-bold uppercase">Début Lundi :</span>
                    <input type="date" id="monday-picker" onchange="save()" class="bg-transparent text-white text-xs font-bold outline-none">
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-emerald-600 px-4 py-2 rounded font-bold text-xs">🖨️ IMPRIMER / PDF</button>
                <button onclick="resetAll()" class="bg-red-600 px-4 py-2 rounded font-bold text-xs">RESET</button>
            </div>
        </div>
        <div id="status-container" class="mt-4 flex flex-wrap gap-1 p-2 bg-black/20 rounded"></div>
    </div>

    <div class="overflow-x-auto">
        <table id="main-table">
            <thead>
                <tr id="row-dates">
                    <th class="header-date" style="width: 180px;">Date</th>
                    </tr>
                <tr id="row-headers">
                    <th class="header-sub">Collaborateur</th>
                    </tr>
            </thead>
            <tbody id="planning-body">
                </tbody>
        </table>
    </div>

    <div class="p-4 bg-slate-50 border-t no-print">
        <textarea id="notes-area" class="w-full p-2 border rounded text-xs" placeholder="Notes et consignes..." oninput="save()"></textarea>
    </div>
</div>

<script>
    const tournsOblig = ["T3","T13","T14","T19","T20","T24","T31","T35"];
    const joursLabel = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
    
    const equipe = [
        "ADAM TOM","ALAJOUANINE STEPHANE","BEDAT QUENTIN","BERNARD RYAN","BILLIAUX CELINE","BRUNET NICOLAS","CAMELOT JEAN LUC","CAMPET AURELIEN","CHARGE MICKAEL","CHARRON ANTHONY","CHAUVET EMILIE","CHEVALIER MARIEN","DEBAILLEUL REMI","DIALLO MOHAMED","FARI LAURENT","FERDIN FREDERIC","GELEZ MARION","GRIVELET STEPHANE","GUILLO SEBASTIEN","HOUNTENTO ABEL","HUCHET DIMITRI","JEANNOT MICHAEL","KICHENIN STEVENS","LACAMBRA DAVID","LARRIEU JEAN CHRISTOPHE","LIVET KARINE","MALOKA PRISO EMMANUEL","MAMONA NGUDI AUDRY","MEYNARD THIERRY","MONTES STEEVEN","MOURY ROMARIC","NAVAS MATEO","OMIECINSKI MAX","OUHANI TARIK","PEREZ OCEANE","PETIT AURELIEN","PEZIN WILLIAM","ROUCOU LISA","SEISDEDOS SEBASTIEN","SOUMARE MOUSSA","TEXIER FRANCK","VANACKER LUDOVIC","VIANCE PHILIPPE"
    ];

    let db = JSON.parse(localStorage.getItem('planningOfficialV1')) || {};

    function initTableHeaders(monday) {
        const rowDates = document.getElementById('row-dates');
        const rowHeaders = document.getElementById('row-headers');
        rowDates.innerHTML = '<th class="header-date">Date</th>';
        rowHeaders.innerHTML = '<th class="header-sub">Collaborateur</th>';

        for (let i = 0; i < 5; i++) {
            let d = new Date(monday);
            d.setDate(d.getDate() + i);
            let dateStr = monday ? d.toLocaleDateString('fr-FR') : joursLabel[i];
            
            rowDates.innerHTML += `<th colspan="3" class="header-date">${dateStr}</th>`;
            rowHeaders.innerHTML += `
                <th class="header-sub" style="width:40px">Heure</th>
                <th class="header-sub">MATIN</th>
                <th class="header-sub">APM</th>
            `;
        }
    }

    function save() {
        const week = document.getElementById('week-selector').value;
        const rows = document.querySelectorAll('#planning-body tr');
        db[week] = {
            monday: document.getElementById('monday-picker').value,
            notes: document.getElementById('notes-area').value,
            data: Array.from(rows).map(r => ({
                name: r.querySelector('.name-col').innerText,
                cells: Array.from(r.querySelectorAll('.cell-input')).map(i => i.value)
            }))
        };
        localStorage.setItem('planningOfficialV1', JSON.stringify(db));
        updateDisplay();
    }

    function updateDisplay() {
        const monday = document.getElementById('monday-picker').value;
        initTableHeaders(monday);
        checkTournees();
    }

    function switchWeek() {
        const week = document.getElementById('week-selector').value;
        const tbody = document.getElementById('planning-body');
        tbody.innerHTML = '';
        
        const data = db[week] || { data: [], notes: "", monday: "" };
        document.getElementById('monday-picker').value = data.monday || "";
        document.getElementById('notes-area').value = data.notes || "";

        equipe.forEach(name => {
            const empData = data.data.find(e => e.name === name) || { cells: Array(10).fill("") };
            const tr = document.createElement('tr');
            let cellsHtml = `<td class="name-col">${name}</td>`;
            
            for (let i = 0; i < 5; i++) {
                cellsHtml += `
                    <td class="hour-col">05h30</td>
                    <td><input type="text" class="cell-input" value="${empData.cells[i*2] || ''}" oninput="save()"></td>
                    <td><input type="text" class="cell-input" value="${empData.cells[i*2+1] || ''}" oninput="save()"></td>
                `;
            }
            tr.innerHTML = cellsHtml;
            tbody.appendChild(tr);
        });
        updateDisplay();
    }

    function checkTournees() {
        const inputs = document.querySelectorAll('.cell-input');
        const found = [];
        inputs.forEach(i => {
            const v = i.value.toUpperCase();
            const td = i.parentElement;
            td.className = ""; // Reset
            if(v === "CP") td.classList.add('bg-cp');
            else if(v === "MAL" || v === "AT") td.classList.add('bg-mal');
            else if(v === "ABS") td.classList.add('bg-abs');
            else if(v === "BUREAU") td.classList.add('bg-bureau');
            
            tournsOblig.forEach(t => { if(v.includes(t)) found.push(t); });
        });

        const status = document.getElementById('status-container');
        status.innerHTML = '';
        tournsOblig.forEach(t => {
            const ok = found.includes(t);
            status.innerHTML += `<div class="px-2 py-1 rounded text-[10px] font-bold border ${ok ? 'tournee-ok' : 'opacity-30 text-white'}">${t} ${ok?'✓':'○'}</div>`;
        });
    }

    function resetAll() { if(confirm("Réinitialiser tout ?")) { localStorage.clear(); location.reload(); } }

    switchWeek();
</script>
</body>
</html>
