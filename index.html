<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Logistique Complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-input { border: none; background: transparent; width: 100%; text-align: center; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .bg-mal, .bg-at { background-color: #f97316 !important; color: white !important; } 
        .bg-cp { background-color: #fef08a !important; color: black !important; }
        .bg-abs { background-color: #fca5a5 !important; color: white !important; }
        .tournee-ok { border-color: #22c55e; color: #15803d; background: #dcfce7; }
        .tournee-manquante { border-color: #cbd5e1; color: #94a3b8; background: #f8fafc; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } }
    </style>
</head>
<body class="bg-slate-100 p-2 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden border border-slate-200">
        
        <div class="p-4 bg-slate-800 text-white no-print">
            <div class="flex justify-between items-center mb-4">
                <h1 class="font-bold text-lg text-blue-400">PLANNING OFFICIEL</h1>
                <div class="flex gap-2">
                    <input type="date" id="monday-picker" onchange="saveData()" class="bg-slate-700 text-white text-[10px] p-1 rounded border-none">
                    <button onclick="window.print()" class="bg-emerald-500 px-3 py-1 rounded text-[10px] font-bold uppercase">Imprimer</button>
                </div>
            </div>
            <p class="text-[9px] uppercase text-slate-400 mb-1 font-bold">Contrôle des tournées obligatoires :</p>
            <div id="status-container" class="flex flex-wrap gap-1"></div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-[10px] uppercase font-bold text-slate-500">
                        <th class="border-b p-3 text-left w-48">Collaborateur</th>
                        <th class="border-b p-3 text-center">Matin</th>
                        <th class="border-b p-3 text-center">Après-midi</th>
                        <th class="border-b p-3 text-center">Mercredi / Notes</th>
                        <th class="no-print w-8"></th>
                    </tr>
                </thead>
                <tbody id="planning-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-50 flex justify-between items-center border-t no-print">
            <button onclick="addRow()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold">+ Ajouter une personne</button>
            <button onclick="resetToOfficial()" class="text-red-400 text-[10px] underline uppercase font-bold">Réinitialiser (40 noms)</button>
        </div>
    </div>

    <script>
        const tournsObligatoires = ["T3","T13","T14","T19","T20","T24","T31","T35"];
        
        // LA LISTE INTÉGRALE DE TES PHOTOS
        const equipeOfficielle = [
            {n:"ADAM TOM", m:"T20", a:"T3", me:""},
            {n:"ALAJOUANINE STEPHANE", m:"MAL", a:"MAL", me:""},
            {n:"BEDAT QUENTIN", m:"T13", a:"T13", me:""},
            {n:"BERNARD RYAN", m:"T23+10H T4/T10", a:"T23", me:""},
            {n:"BILLIAUX CELINE", m:"", a:"", me:""},
            {n:"BRUNET NICOLAS", m:"T34", a:"T34", me:""},
            {n:"CAMELOT JEAN LUC", m:"T28", a:"T28", me:""},
            {n:"CAMPET AURELIEN", m:"T16+10H T16", a:"T16", me:""},
            {n:"CHARGE MICKAEL", m:"T11", a:"T11", me:""},
            {n:"CHARRON ANTHONY", m:"T02", a:"T02", me:""},
            {n:"CHAUVET EMILIE", m:"T14", a:"T14", me:""},
            {n:"CHEVALIER MARIEN", m:"AT", a:"AT", me:""},
            {n:"DEBAILLEUL REMI", m:"T4 GRAD", a:"BUREAU", me:""},
            {n:"DIALLO MOHAMED", m:"T6", a:"T6", me:""},
            {n:"FARI LAURENT", m:"CP", a:"CP", me:""},
            {n:"FERDIN FREDERIC", m:"T18", a:"T18", me:""},
            {n:"GELEZ MARION", m:"T03", a:"T20", me:""},
            {n:"GRIVELET STEPHANE", m:"T9", a:"T9 + MURET", me:""},
            {n:"GUILLO SEBASTIEN", m:"BUREAU", a:"BUREAU", me:""},
            {n:"HOUNTENTO ABEL", m:"ABS", a:"ABS", me:""},
            {n:"HUCHET DIMITRI", m:"T19", a:"T19", me:""},
            {n:"JEANNOT MICHAEL", m:"T12 + 10H T12", a:"T12", me:""},
            {n:"KICHENIN STEVENS", m:"AT", a:"AT", me:""},
            {n:"LACAMBRA DAVID", m:"T15", a:"T15", me:""},
            {n:"LARRIEU JEAN CHRISTOPHE", m:"T02", a:"T02", me:""},
            {n:"LIVET KARINE", m:"T33", a:"T33", me:""},
            {n:"MALOKA PRISO EMMANUEL", m:"AT", a:"AT", me:""},
            {n:"MAMONA NGUDI AUDRY", m:"T22", a:"T22", me:""},
            {n:"MEYNARD THIERRY", m:"T35", a:"T4/T4", me:""},
            {n:"MONTES STEEVEN", m:"T30", a:"T30 + CV", me:""},
            {n:"MOURY ROMARIC", m:"T37", a:"T37", me:""},
            {n:"NAVAS MATEO", m:"T26/32 + 10H", a:"T26/32", me:""},
            {n:"OMIECINSKI MAX", m:"CP", a:"T29", me:""},
            {n:"OUHANI TARIK", m:"T21", a:"T21", me:""},
            {n:"PEREZ OCEANE", m:"T4 PESSAC", a:"T35", me:""},
            {n:"PETIT AURELIEN", m:"T17", a:"T17", me:""},
            {n:"PEZIN WILLIAM", m:"T31", a:"T31", me:""},
            {n:"ROUCOU LISA", m:"T8", a:"T8 + 15H CV", me:""},
            {n:"SEISDEDOS SEBASTIEN", m:"T29", a:"PONDEREUX", me:""},
            {n:"SOUMARE MOUSSA", m:"T24 + 10H", a:"T24", me:""},
            {n:"TEXIER FRANCK", m:"CP", a:"CP", me:""},
            {n:"VANACKER LUDOVIC", m:"T37", a:"T37", me:""},
            {n:"VIANCE PHILIPPE", m:"T10 + 10H T28", a:"T10", me:""}
        ];

        let db = JSON.parse(localStorage.getItem('pDataIntegral'));

        function saveData() {
            const rows = document.querySelectorAll('#planning-body tr');
            db = {
                monday: document.getElementById('monday-picker').value,
                planning: Array.from(rows).map(r => ({
                    n: r.querySelector('.name-input').value,
                    m: r.querySelectorAll('.cell-input')[0].value,
                    a: r.querySelectorAll('.cell-input')[1].value,
                    me: r.querySelectorAll('.cell-input')[2].value
                }))
            };
            localStorage.setItem('pDataIntegral', JSON.stringify(db));
            check();
        }

        function load() {
            const tbody = document.getElementById('planning-body');
            tbody.innerHTML = '';
            if (!db) {
                equipeOfficielle.forEach(i => addRow(i.n, i.m, i.a, i.me));
            } else {
                document.getElementById('monday-picker').value = db.monday || "";
                db.planning.forEach(i => addRow(i.n, i.m, i.a, i.me));
            }
            check();
        }

        function addRow(n="", m="", a="", me="") {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-2 border-r bg-slate-50/50">
                    <input type="text" class="name-input w-full outline-none uppercase font-bold text-slate-700 text-[10px]" value="${n}" oninput="saveData()">
                </td>
                <td class="p-2 border-r cell-container">
                    <input type="text" class="cell-input" value="${m}" oninput="saveData()">
                </td>
                <td class="p-2 border-r cell-container">
                    <input type="text" class="cell-input" value="${a}" oninput="saveData()">
                </td>
                <td class="p-2 border-r cell-container">
                    <input type="text" class="cell-input" value="${me}" oninput="saveData()">
                </td>
                <td class="no-print p-2 text-center text-slate-300">
                    <button onclick="this.parentElement.parentElement.remove();saveData()">×</button>
                </td>
            `;
            document.getElementById('planning-body').appendChild(tr);
            check();
        }

        function check() {
            const vals = [];
            document.querySelectorAll('.cell-input').forEach(i => {
                const v = i.value.toUpperCase(); 
                const c = i.parentElement;
                c.className = "p-2 border-r cell-container";
                if(v === "CP") c.classList.add('bg-cp');
                if(v === "MAL" || v === "AT") c.classList.add('bg-mal');
                if(v === "ABS") c.classList.add('bg-abs');
                // Capture les tournées (ex: T20, T3...)
                const matches = v.match(/T\d+/g);
                if(matches) matches.forEach(m => vals.push(m));
            });
            const cont = document.getElementById('status-container');
            cont.innerHTML = '';
            tournsObligatoires.forEach(t => {
                const ok = vals.includes(t);
                const b = document.createElement('div');
                b.className = `px-2 py-1 border rounded text-[8px] font-black ${ok ? 'tournee-ok' : 'tournee-manquante opacity-50'}`;
                b.innerText = t + (ok ? ' ✓' : ' ○');
                cont.appendChild(b);
            });
        }

        function resetToOfficial() {
            if(confirm("Attention : cela va effacer vos modifications et remettre la liste des 40 personnes à zéro. Continuer ?")) {
                localStorage.removeItem('pDataIntegral');
                db = null;
                load();
            }
        }
        load();
    </script>
</body>
</html>
