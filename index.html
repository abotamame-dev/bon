<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Planning Logistique - Contrôle Intégral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #cbd5e1; text-align: center; font-size: 0.65rem; padding: 0; height: 32px; }
        .name-col { width: 180px; text-align: left; padding-left: 8px; font-weight: 800; background: #f8fafc; font-size: 0.75rem; }
        .hour-col { width: 45px; background: #f1f5f9; color: #64748b; font-size: 0.55rem; font-weight: bold; }
        .cell-select { width: 100%; height: 100%; border: none; text-align: center; font-weight: 900; text-transform: uppercase; background: transparent; outline: none; appearance: none; cursor: pointer; font-size: 0.7rem; }
        
        .header-date { background-color: #1e40af; color: white; font-weight: 900; height: 35px; }
        .header-sub { background-color: #fef08a; font-weight: 800; height: 25px; color: #854d0e; }
        
        /* Panneau de Contrôle Optimisé */
        .ctrl-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 10px; }
        .ctrl-day { background: #0f172a; border-radius: 4px; padding: 6px; border: 1px solid #334155; }
        .tournee-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }
        .status-box { font-size: 0.55rem; padding: 1px 4px; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; }
        .ok { background: #16a34a; color: white; font-weight: bold; border: 1px solid #15803d; }
        .miss { background: #1e293b; color: #475569; border: 1px solid #334155; }

        /* Couleurs Tableau */
        .bg-mal, .bg-at { background-color: #f97316 !important; color: white; }
        .bg-cp { background-color: #fef9c3 !important; color: black; }
        .bg-abs { background-color: #ef4444 !important; color: white; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-200 p-2">

<div class="mx-auto bg-white shadow-2xl rounded-lg overflow-hidden border border-slate-300">
    
    <div class="p-4 bg-slate-900 text-white no-print">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-blue-400">FLUX TOURNÉES OBLIGATOIRES</h1>
            <div class="flex gap-4">
                <input type="date" id="monday-picker" onchange="save()" class="bg-slate-700 p-2 rounded text-xs font-bold text-white outline-none">
                <button onclick="window.print()" class="bg-emerald-600 px-4 py-2 rounded font-bold text-xs uppercase">Imprimer</button>
            </div>
        </div>

        <div class="ctrl-grid" id="control-panel"></div>
    </div>

    <div class="overflow-x-auto">
        <table>
            <thead>
                <tr id="row-dates"><th class="header-date">DATE</th></tr>
                <tr id="row-headers"><th class="header-sub">COLLABORATEUR</th></tr>
            </thead>
            <tbody id="planning-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Ajout des tournées manquantes (T03, T11, T13, T14, T16, T19, T20, T24, T26/32, T31, T35)
    const TOURN_OBLIG = ["T03", "T11", "T13", "T14", "T16", "T19", "T20", "T24", "T26/32", "T31", "T35"];
    const TOURN_AUTRES = ["T2","T4","T6","T8","T9","T10","T12","T15","T17","T18","T21","T22","T23","T28","T29","T30","T33","T34","T37","PONDEREUX","BUREAU"];
    const ABSENCES = ["CP", "MAL", "AT", "ABS"];
    const EQUIPE = ["ADAM TOM","ALAJOUANINE STEPHANE","BEDAT QUENTIN","BERNARD RYAN","BILLIAUX CELINE","BRUNET NICOLAS","CAMELOT JEAN LUC","CAMPET AURELIEN","CHARGE MICKAEL","CHARRON ANTHONY","CHAUVET EMILIE","CHEVALIER MARIEN","DEBAILLEUL REMI","DIALLO MOHAMED","FARI LAURENT","FERDIN FREDERIC","GELEZ MARION","GRIVELET STEPHANE","GUILLO SEBASTIEN","HOUNTENTO ABEL","HUCHET DIMITRI","JEANNOT MICHAEL","KICHENIN STEVENS","LACAMBRA DAVID","LARRIEU JEAN CHRISTOPHE","LIVET KARINE","MALOKA PRISO EMMANUEL","MAMONA NGUDI AUDRY","MEYNARD THIERRY","MONTES STEEVEN","MOURY ROMARIC","NAVAS MATEO","OMIECINSKI MAX","OUHANI TARIK","PEREZ OCEANE","PETIT AURELIEN","PEZIN WILLIAM","ROUCOU LISA","SEISDEDOS SEBASTIEN","SOUMARE MOUSSA","TEXIER FRANCK","VANACKER LUDOVIC","VIANCE PHILIPPE"];

    let db = JSON.parse(localStorage.getItem('planning_V9_Final')) || {};

    function initHeader() {
        const monday = document.getElementById('monday-picker').value;
        const rDates = document.getElementById('row-dates');
        const rHeads = document.getElementById('row-headers');
        rDates.innerHTML = '<th class="header-date">DATE</th>';
        rHeads.innerHTML = '<th class="header-sub">COLLABORATEUR</th>';

        for (let i = 0; i < 5; i++) {
            let d = new Date(monday || new Date());
            if(monday) d.setDate(d.getDate() + i);
            let label = monday ? d.toLocaleDateString('fr-FR') : ["LUNDI","MARDI","MERCREDI","JEUDI","VENDREDI"][i];
            rDates.innerHTML += `<th colspan="3" class="header-date">${label}</th>`;
            rHeads.innerHTML += `<th class="header-sub">H</th><th class="header-sub">MATIN</th><th class="header-sub">APM</th>`;
        }
    }

    function createSelect(val) {
        let opt = `<option value="">--</option><optgroup label="ABSENCE">`;
        ABSENCES.forEach(a => opt += `<option value="${a}" ${val===a?'selected':''}>${a}</option>`);
        opt += `</optgroup><optgroup label="PRINCIPALES">`;
        TOURN_OBLIG.forEach(t => opt += `<option value="${t}" ${val===t?'selected':''}>${t}</option>`);
        opt += `</optgroup><optgroup label="AUTRES">`;
        TOURN_AUTRES.forEach(t => opt += `<option value="${t}" ${val===t?'selected':''}>${t}</option>`);
        return `<select class="cell-select" onchange="save()">${opt}</select>`;
    }

    function render() {
        const tbody = document.getElementById('planning-body');
        tbody.innerHTML = '';
        const curData = db.data || [];
        EQUIPE.forEach(name => {
            const emp = curData.find(e => e.name === name) || { cells: Array(10).fill("") };
            const tr = document.createElement('tr');
            let html = `<td class="name-col">${name}</td>`;
            for (let i = 0; i < 5; i++) {
                html += `<td class="hour-col">05h30</td>
                         <td>${createSelect(emp.cells[i*2])}</td>
                         <td>${createSelect(emp.cells[i*2+1])}</td>`;
            }
            tr.innerHTML = html;
            tbody.appendChild(tr);
        });
        updateControl();
    }

    function updateControl() {
        const rows = document.querySelectorAll('#planning-body tr');
        const daysData = Array.from({length: 5}, () => ({ mat: [], apm: [] }));
        
        rows.forEach(r => {
            const selects = r.querySelectorAll('.cell-select');
            selects.forEach((s, idx) => {
                const dayIdx = Math.floor(idx / 2);
                const phase = idx % 2 === 0 ? 'mat' : 'apm';
                if(s.value) {
                    daysData[dayIdx][phase].push(s.value);
                    const td = s.parentElement;
                    td.className = ABSENCES.includes(s.value) ? (s.value === 'CP' ? 'bg-cp' : 'bg-mal') : '';
                } else { s.parentElement.className = ''; }
            });
        });

        const panel = document.getElementById('control-panel');
        panel.innerHTML = '';
        const joursLabel = ["LUN", "MAR", "MER", "JEU", "VEN"];
        
        joursLabel.forEach((label, i) => {
            let html = `<div class="ctrl-day"><div class="text-[9px] font-black text-blue-400 text-center mb-1 border-b border-slate-700 pb-1">${label}</div><div class="tournee-list">`;
            TOURN_OBLIG.forEach(t => {
                const isOk = daysData[i].mat.includes(t) || daysData[i].apm.includes(t);
                html += `<div class="status-box ${isOk?'ok':'miss'}"><span>${t}</span><span>${isOk?'✓':''}</span></div>`;
            });
            html += `</div></div>`;
            panel.innerHTML += html;
        });
    }

    function save() {
        const rows = document.querySelectorAll('#planning-body tr');
        db = {
            monday: document.getElementById('monday-picker').value,
            data: Array.from(rows).map(r => ({
                name: r.querySelector('.name-col').innerText,
                cells: Array.from(r.querySelectorAll('.cell-select')).map(s => s.value)
            }))
        };
        localStorage.setItem('planning_V9_Final', JSON.stringify(db));
        initHeader();
        updateControl();
    }

    document.getElementById('monday-picker').value = db.monday || "";
    initHeader();
    render();
</script>
</body>
</html>
