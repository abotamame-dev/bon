<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Planning Pro - Calendrier Dynamique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-input { border: none; background: transparent; width: 100%; text-align: center; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .bg-mal, .bg-at { background-color: #f97316 !important; color: white !important; } 
        .bg-cp { background-color: #fef08a !important; color: black !important; }
        .bg-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; }
        .tournee-ok { border-color: #22c55e; color: #15803d; background: #dcfce7; }
        .tournee-manquante { border-color: #94a3b8; color: #64748b; background: #f1f5f9; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .max-w-5xl { max-width: 100%; box-shadow: none; border: none; }
            th, td { border: 1px solid #ccc !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-800">

<div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
    
    <div class="p-6 border-b border-slate-100 bg-slate-800 text-white no-print">
        <div class="flex justify-between items-start mb-4">
            <div class="space-y-3">
                <h1 class="text-xl font-bold">🚀 Superviseur Planning</h1>
                <div class="flex flex-wrap gap-3">
                    <div class="flex items-center bg-slate-700 rounded-lg p-1">
                        <span class="px-2 text-[10px] font-bold text-slate-400 uppercase">Fente :</span>
                        <select id="week-selector" onchange="switchWeek()" class="bg-slate-600 border-none text-white text-sm font-bold rounded focus:ring-0 cursor-pointer">
                            <option value="S1">Semaine 1</option>
                            <option value="S2">Semaine 2</option>
                            <option value="S3">Semaine 3</option>
                            <option value="S4">Semaine 4</option>
                        </select>
                    </div>
                    <div class="flex items-center bg-slate-700 rounded-lg p-1">
                        <span class="px-2 text-[10px] font-bold text-slate-400 uppercase">Lundi du :</span>
                        <input type="date" id="monday-picker" onchange="saveCurrentWeek()" class="bg-slate-600 border-none text-white text-sm font-bold rounded focus:ring-0 cursor-pointer shadow-inner">
                    </div>
                    <button onclick="copyPreviousWeek()" class="text-slate-300 hover:text-white text-[10px] font-bold uppercase underline decoration-slate-500">Copier équipe précédente</button>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded font-bold text-xs transition">💾 Partager</button>
                <button onclick="window.print()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-2 rounded font-bold text-xs transition">🖨️ Imprimer</button>
            </div>
        </div>
        <div id="status-container" class="bg-slate-700 p-4 rounded-lg flex flex-wrap gap-2"></div>
    </div>

    <div class="overflow-x-auto">
        <div class="hidden print:block text-center p-4 border-b-2 border-slate-800 font-black text-xl uppercase" id="print-header"></div>
        <table class="w-full border-collapse">
            <thead>
                <tr class="bg-slate-100 text-slate-600 text-[10px] uppercase font-bold">
                    <th class="border-b p-4 text-left w-64">Collaborateur</th>
                    <th class="border-b p-4 text-center bg-blue-50/50">Lundi <span id="date-lundi" class="block text-blue-600"></span></th>
                    <th class="border-b p-4 text-center">Mardi <span id="date-mardi" class="block text-slate-400"></span></th>
                    <th class="border-b p-4 text-center bg-slate-50/50">Mercredi <span id="date-mercredi" class="block text-slate-400"></span></th>
                    <th class="border-b p-1 w-10 no-print"></th>
                </tr>
            </thead>
            <tbody id="planning-body" class="divide-y divide-slate-100"></tbody>
        </table>
    </div>

    <div class="p-6 bg-white border-t border-slate-200">
        <h3 class="text-sm font-bold text-slate-500 uppercase mb-2">📝 Notes de service</h3>
        <textarea id="notes-area" class="w-full p-4 border border-slate-200 rounded-lg bg-slate-50 min-h-[80px] text-sm" placeholder="Consignes..." oninput="saveCurrentWeek()"></textarea>
    </div>

    <div class="p-4 bg-slate-50 flex justify-between items-center no-print border-t">
        <button onclick="addRow()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition">+ Ajouter Collaborateur</button>
        <div id="save-status" class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Enregistrement auto ✓</div>
    </div>
</div>

<script>
    const tourneesObligatoires = ["T3", "T13", "T14", "T19", "T20", "T24", "T31", "T35"];
    let db = JSON.parse(localStorage.getItem('planningDatesV1')) || { S1: { planning: [], notes: "", monday: "" } };

    function getCurrentWeekID() { return document.getElementById('week-selector').value; }

    function updateHeaderDates(mondayDate) {
        if (!mondayDate) {
            ["lundi", "mardi", "mercredi"].forEach(d => document.getElementById('date-'+d).innerText = "");
            return;
        }
        const d = new Date(mondayDate);
        const options = { day: '2-digit', month: '2-digit' };
        document.getElementById('date-lundi').innerText = d.toLocaleDateString('fr-FR', options);
        d.setDate(d.getDate() + 1);
        document.getElementById('date-mardi').innerText = d.toLocaleDateString('fr-FR', options);
        d.setDate(d.getDate() + 1);
        document.getElementById('date-mercredi').innerText = d.toLocaleDateString('fr-FR', options);
    }

    function switchWeek() {
        const weekID = getCurrentWeekID();
        loadWeek(weekID);
    }

    function saveCurrentWeek() {
        const weekID = getCurrentWeekID();
        const rows = document.querySelectorAll('#planning-body tr');
        const monday = document.getElementById('monday-picker').value;
        db[weekID] = {
            monday: monday,
            planning: Array.from(rows).map(row => ({
                nom: row.querySelector('.name-input').value,
                matin: row.querySelectorAll('.cell-input')[0].value,
                apm: row.querySelectorAll('.cell-input')[1].value,
                mer: row.querySelectorAll('.cell-input')[2].value
            })),
            notes: document.getElementById('notes-area').value
        };
        localStorage.setItem('planningDatesV1', JSON.stringify(db));
        updateHeaderDates(monday);
        checkConflictsAndCoverage();
    }

    function loadWeek(weekID) {
        const tbody = document.getElementById('planning-body');
        tbody.innerHTML = '';
        const data = db[weekID] || { planning: [], notes: "", monday: "" };
        document.getElementById('monday-picker').value = data.monday || "";
        updateHeaderDates(data.monday);
        
        if (data.planning.length === 0) addRow("NOM");
        else data.planning.forEach(item => addRow(item.nom, item.matin, item.apm, item.mer));
        document.getElementById('notes-area').value = data.notes || "";
        checkConflictsAndCoverage();
    }

    function addRow(nom = "", matin = "", apm = "", mer = "") {
        const tbody = document.getElementById('planning-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="p-4 border-r border-slate-50 font-bold bg-slate-50/30">
                <input type="text" class="name-input w-full bg-transparent outline-none uppercase" value="${nom}" oninput="saveCurrentWeek()">
            </td>
            <td class="p-2 cell-container border-r border-slate-100">
                <input type="text" class="cell-input" value="${matin}" placeholder="Matin" oninput="saveCurrentWeek()">
            </td>
            <td class="p-2 cell-container border-r border-slate-100">
                <input type="text" class="cell-input" value="${apm}" placeholder="Midi" oninput="saveCurrentWeek()">
            </td>
            <td class="p-2 cell-container border-r border-slate-100">
                <input type="text" class="cell-input" value="${mer}" placeholder="Mer." oninput="saveCurrentWeek()">
            </td>
            <td class="p-1 text-center no-print">
                <button onclick="this.parentElement.parentElement.remove(); saveCurrentWeek();" class="text-slate-300 hover:text-red-500 font-bold">×</button>
            </td>
        `;
        tbody.appendChild(tr);
        checkConflictsAndCoverage();
    }

    function checkConflictsAndCoverage() {
        const values = [];
        document.querySelectorAll('.cell-container').forEach(c => c.className = "p-2 cell-container border-r border-slate-100");
        document.querySelectorAll('.cell-input').forEach(input => {
            const val = input.value.trim().toUpperCase();
            if (!val) return;
            const container = input.parentElement;
            if(val === "CP") container.classList.add('bg-cp');
            if(val === "MAL" || val === "AT") container.classList.add('bg-mal');
            if(val.startsWith('T')) values.push(val);
        });
        const container = document.getElementById('status-container');
        container.innerHTML = '';
        tourneesObligatoires.forEach(t => {
            const ok = values.includes(t);
            const badge = document.createElement('div');
            badge.className = `px-3 py-1 border rounded text-[10px] font-black ${ok ? 'tournee-ok' : 'tournee-manquante opacity-40'}`;
            badge.innerText = `${t} ${ok ? '✓' : '○'}`;
            container.appendChild(badge);
        });
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'}));
        a.download = `planning_complet.json`;
        a.click();
    }

    switchWeek();
</script>
</body>
</html>
